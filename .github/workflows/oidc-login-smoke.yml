name: Azure OIDC Login Smoke Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  azure-login-smoke:
    name: Azure login smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Show GitHub OIDC context
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "workflow=${{ github.workflow }}"

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure account
        run: |
          az account show --query "{subscription:name, subscriptionId:id, tenantId:tenantId, user:user.name}" --output table
